<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="BODA STUDIO AI — From Shoot to Post, In One Flow. Smart photo management & IG content builder.">
    <title>BODA STUDIO AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A0F1C">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
      // Smart Polyfill: Hanya aktif saat layar benar-benar disentuh (Touch).
      // Membiarkan Mouse PC bekerja secara default bawaan HTML5.
      window.addEventListener('touchstart', function() {
        if (!window._dragDropPolyfilled) {
          window._dragDropPolyfilled = true;
          var script = document.createElement('script');
          script.src = 'https://bernardopacheco.github.io/drag-drop-touch/drag-drop-touch.js';
          document.head.appendChild(script);
        }
      }, { once: true, passive: true });
    </script>
</head>

<body>

    <!-- Animated Backgrounds -->
    <div class="bg-grid"></div>
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>

    <!-- Mobile Hamburger -->
    <button class="hamburger" onclick="toggleSidebar()">☰</button>

    <div class="app">
        <!-- ──── Sidebar ──── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo-icon">B</div>
                <div class="brand-text">
                    <h1>BODA STUDIO</h1>
                    <p>From Shoot to Post</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">Main</div>

                <a class="nav-item active" data-route="#dashboard" href="#dashboard"
                    onclick="document.querySelector('.sidebar').classList.remove('open')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1" />
                        <rect x="14" y="3" width="7" height="7" rx="1" />
                        <rect x="3" y="14" width="7" height="7" rx="1" />
                        <rect x="14" y="14" width="7" height="7" rx="1" />
                    </svg>
                    Dashboard
                </a>



                <a class="nav-item" data-route="#ig-builder" href="#ig-builder"
                    onclick="document.querySelector('.sidebar').classList.remove('open')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                    </svg>
                    IG Builder
                </a>

                <a class="nav-item" data-route="#branding" href="#branding"
                    onclick="document.querySelector('.sidebar').classList.remove('open')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                    Branding
                </a>

                <a class="nav-item" data-route="#linkboda" href="#linkboda"
                    onclick="document.querySelector('.sidebar').classList.remove('open')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                    </svg>
                    Link Boda
                </a>

                <a class="nav-item" data-route="#settings" href="#settings"
                    onclick="document.querySelector('.sidebar').classList.remove('open')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
                    </svg>
                    Cloud Sync
                </a>

            </nav>

            <div style="padding:1rem;border-top:1px solid var(--border-glass);">
                <div style="font-size:0.7rem;color:var(--text-muted);text-align:center;">
                    BODA STUDIO AI v2.0<br>
                    <span style="opacity:0.6;">Phase 2 — Selection</span>
                </div>
            </div>
        </aside>

        <!-- ──── Main Content ──── -->
        <main class="main" id="main-content">
            <!-- Content injected by Router -->
        </main>
    </div>

    <!-- ──── Modal Overlay ──── -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal-content"></div>
    </div>

    <!-- ──── Lightbox ──── -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="close-lb" onclick="closeLightbox()">✕</button>
        <img src="" alt="">
    </div>

    <!-- ──── Drop Overlay ──── -->
    <div class="drop-overlay" id="drop-overlay">
        <div class="drop-box">
            <div class="drop-icon">📥</div>
            <h3>Drop photos here</h3>
            <p>Release to add photos to this project</p>
        </div>
    </div>

    <!-- ──── Toast Container ──── -->
    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics-compat.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Boda Studio PWA Service Worker registered.', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</body>

</html>
